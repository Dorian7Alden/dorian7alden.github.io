name: Deploy Blog

on:
  push:
    branches:
      - main
      - notes
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout blog source
        uses: actions/checkout@v4
        with:
          ref: main
          path: blog

      - name: Checkout notes source
        uses: actions/checkout@v4
        with:
          ref: notes
          path: notes-source

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: blog/package-lock.json

      - name: Install dependencies
        working-directory: blog
        run: npm ci

      - name: Sync notes
        working-directory: blog
        env:
          NOTES_REPO: ${{ github.workspace }}/notes-source
          CONTENT_DIR: generated/notes
        run: npm run sync

      - name: Build VitePress
        working-directory: blog
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: blog/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
